<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
    const ctx = canvas.getContext('2d');
    const s = canvas.width;

    // Background
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, s, s);

    // Snake head block
    const bs = s * 0.5;
    const bx = (s - bs) / 2;
    const by = s * 0.15;
    const r = bs * 0.2;

    const grad = ctx.createLinearGradient(bx, by, bx, by + bs);
    grad.addColorStop(0, '#e74c3c');
    grad.addColorStop(1, '#c0392b');
    ctx.fillStyle = grad;

    ctx.beginPath();
    ctx.moveTo(bx + r, by);
    ctx.lineTo(bx + bs - r, by);
    ctx.quadraticCurveTo(bx + bs, by, bx + bs, by + r);
    ctx.lineTo(bx + bs, by + bs - r);
    ctx.quadraticCurveTo(bx + bs, by + bs, bx + bs - r, by + bs);
    ctx.lineTo(bx + r, by + bs);
    ctx.quadraticCurveTo(bx, by + bs, bx, by + bs - r);
    ctx.lineTo(bx, by + r);
    ctx.quadraticCurveTo(bx, by, bx + r, by);
    ctx.fill();

    // Eyes
    const eyeS = bs * 0.13;
    const eyeY = by + bs * 0.35;
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(bx + bs * 0.35, eyeY, eyeS, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(bx + bs * 0.65, eyeY, eyeS, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(bx + bs * 0.37, eyeY, eyeS * 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(bx + bs * 0.67, eyeY, eyeS * 0.5, 0, Math.PI * 2);
    ctx.fill();

    // Number 1
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = `bold ${bs * 0.35}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('1', s / 2, by + bs * 0.7);

    // Title
    ctx.fillStyle = '#a29bfe';
    ctx.font = `bold ${s * 0.12}px sans-serif`;
    ctx.fillText('Snake', s / 2, by + bs + s * 0.1);
    ctx.fillStyle = '#fd79a8';
    ctx.fillText('Math', s / 2, by + bs + s * 0.22);
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));

// Download links
['c192', 'c512'].forEach(id => {
    const c = document.getElementById(id);
    const a = document.createElement('a');
    a.download = `icon-${c.width}.png`;
    a.href = c.toDataURL();
    a.textContent = `Download ${c.width}`;
    document.body.appendChild(a);
    document.body.appendChild(document.createElement('br'));
});
</script>
</body>
</html>
